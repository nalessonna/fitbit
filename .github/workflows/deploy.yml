name: Deploy to AWS ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  deploy-rails:
    name: Build & Deploy Rails
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Rails image
        id: build-rails
        env:
          ECR_REGISTRY:   ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.RAILS_ECR_REPOSITORY }}
          IMAGE_TAG:      ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            ./my-rails-api
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download Rails task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_RAILS_TASK_DEFINITION }} \
            --query taskDefinition \
            > rails-task-def.json

      - name: Update Rails task definition with new image
        id: rails-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  rails-task-def.json
          container-name:   ${{ secrets.RAILS_CONTAINER_NAME }}
          image:            ${{ steps.build-rails.outputs.image }}
          environment-variables: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            SECRET_KEY_BASE=${{ secrets.SECRET_KEY_BASE }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            RAILS_ENV=production

      - name: Deploy Rails to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:          ${{ steps.rails-task-def.outputs.task-definition }}
          service:                  ${{ secrets.ECS_RAILS_SERVICE_ARN }}
          cluster:                  ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

  deploy-next:
    name: Build & Deploy Next.js
    runs-on: ubuntu-latest
    needs: deploy-rails

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Next.js image
        id: build-next
        env:
          ECR_REGISTRY:   ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.NEXT_ECR_REPOSITORY }}
          IMAGE_TAG:      ${{ github.sha }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_RAILS_API_URL=${{ secrets.NEXT_PUBLIC_RAILS_API_URL }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            ./my-next-app
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download Next.js task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_NEXT_TASK_DEFINITION }} \
            --query taskDefinition \
            > next-task-def.json

      - name: Update Next.js task definition with new image
        id: next-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  next-task-def.json
          container-name:   ${{ secrets.NEXT_CONTAINER_NAME }}
          image:            ${{ steps.build-next.outputs.image }}
          environment-variables: |
            RAILS_API_URL=${{ secrets.NEXT_PUBLIC_RAILS_API_URL }}

      - name: Deploy Next.js to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:          ${{ steps.next-task-def.outputs.task-definition }}
          service:                  ${{ secrets.ECS_NEXT_SERVICE_ARN }}
          cluster:                  ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true
